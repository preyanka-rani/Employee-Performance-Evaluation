version: "3.9"

services:
  # ── Redis (broker + result backend) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI application ────────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - app_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery worker ──────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 -Q celery
    env_file:
      - ../.env
    volumes:
      - app_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy

  # ── Celery beat (scheduler) ─────────────────────────────────────────────────
  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy

volumes:
  app_data:
    driver: local
